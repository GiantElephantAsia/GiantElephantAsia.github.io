<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛玻璃网页</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url(https://picsum.photos/1000/1000);
      background-size: cover;
      filter: blur(10px);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 10px;
      max-width: 800px;
    }

    .title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .text {
      font-size: 16px;
      line-height: 1.5;
    }

    .button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .content {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="background"></div>
    <div class="content">
      <h1 class="title">毛玻璃网页</h1>
      <p class="text">这是一个毛玻璃网页示例，包含背景、标题、文字叙述、按钮，并且响应式。</p>
      <button class="button">点击按钮</button>
    </div>
  </div>
</body>
</html>
