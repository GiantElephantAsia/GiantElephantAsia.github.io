<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛玻璃网页</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-image: url('/images/background-general-2.jpg');
    }
    .container {
      width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(7px);
      border-radius: 10px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-top: 0;
    }
    .text {
      margin-top: 10px;
      line-height: 1.5;
    }
    .button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background-color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">毛玻璃网页</h1>
    <p class="text">
      这是一个使用 CSS 毛玻璃效果的网页。毛玻璃效果可以使网页背景变得模糊，从而突出主要内容。
    </p>
    <button class="button">点击按钮</button>
  </div>
</body>
</html>
